<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Management - Fraxy Match</title>
    <!-- Bootstrap and Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --theme-primary: #0d6efd;
            --theme-gradient: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            --theme-bg-soft: rgba(13, 110, 253, 0.1);
        }

        body.theme-project {
            --theme-primary: #198754;
            --theme-gradient: linear-gradient(135deg, #198754 0%, #157347 100%);
            --theme-bg-soft: rgba(25, 135, 84, 0.1);
        }

        body.theme-professional {
            --theme-primary: #6f42c1;
            --theme-gradient: linear-gradient(135deg, #6f42c1 0%, #5a32a3 100%);
            --theme-bg-soft: rgba(111, 66, 193, 0.1);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .profile-header {
            background: var(--theme-gradient);
            color: white;
            padding: 2rem;
            text-align: center;
            position: relative;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--theme-primary);
            margin: 0 auto 1rem;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-preview-sm {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--theme-primary);
            overflow: hidden;
            border: 2px solid var(--theme-bg-soft);
        }

        .avatar-preview-sm img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-pills .nav-link {
            color: #495057;
            border-radius: 10px;
            padding: 0.8rem 1.5rem;
            font-weight: 500;
        }

        .nav-pills .nav-link.active {
            background-color: var(--theme-primary);
            box-shadow: 0 4px 15px var(--theme-bg-soft);
        }

        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.85rem;
        }

        .form-control:focus {
            border-color: var(--theme-primary);
            box-shadow: 0 0 0 0.25rem var(--theme-bg-soft);
        }

        .text-theme-primary {
            color: var(--theme-primary) !important;
        }

        .btn-theme-primary {
            background-color: var(--theme-primary);
            border-color: var(--theme-primary);
            color: white;
        }

        .btn-theme-primary:hover {
            filter: brightness(0.9);
            color: white;
        }

        .btn-outline-theme {
            color: var(--theme-primary);
            border-color: var(--theme-primary);
        }

        .btn-outline-theme:hover {
            background-color: var(--theme-primary);
            color: white;
        }

        .save-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 1.5rem;
            border: 1px solid #dee2e6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <a href="#" class="btn btn-link text-decoration-none p-0" id="backToDashboard">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>

                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="avatarContainer">
                            <i class="bi bi-person"></i>
                        </div>
                        <h2 id="userNameDisplay" class="mb-1">User Profile</h2>
                        <p class="mb-0 opacity-75" id="userTypeDisplay">Identity Profile</p>
                    </div>

                    <div class="row g-0">
                        <div class="col-md-3 border-end bg-light p-3">
                            <div class="nav flex-column nav-pills" id="profileTabs" role="tablist">
                                <button class="nav-link active mb-2 text-start" data-bs-toggle="pill"
                                    data-bs-target="#general" type="button">
                                    <i class="bi bi-building me-2"></i> Company
                                </button>
                                <button class="nav-link mb-2 text-start" data-bs-toggle="pill"
                                    data-bs-target="#security" type="button">
                                    <i class="bi bi-shield-lock me-2"></i> Password
                                </button>
                                <button class="nav-link text-start" data-bs-toggle="pill" data-bs-target="#subscription"
                                    type="button">
                                    <i class="bi bi-credit-card me-2"></i> Subscription
                                </button>
                            </div>
                        </div>
                        <div class="col-md-9">
                            <div class="tab-content p-4" id="profileTabContent">
                                <!-- General Info Tab -->
                                <div class="tab-pane fade show active" id="general">
                                    <h5 class="fw-bold mb-4">Company Details</h5>
                                    <form id="profileForm">
                                        <div class="row g-3">
                                            <div class="col-md-12">
                                                <label class="form-label">Company Logo</label>
                                                <div class="d-flex align-items-center gap-3">
                                                    <div class="avatar-preview-sm" id="avatarPreview">
                                                        <i class="bi bi-person"></i>
                                                    </div>
                                                    <div class="flex-grow-1">
                                                        <input type="file" class="form-control form-control-sm"
                                                            id="logoUpload" accept="image/*">
                                                        <div class="form-text small">Upload a local image for your
                                                            company logo.</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-md-12">
                                                <label class="form-label">Business Registration Number</label>
                                                <input type="text" class="form-control" id="businessReg"
                                                    placeholder="Enter BR number">
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label">Company Website</label>
                                                <div class="input-group">
                                                    <span class="input-group-text"><i class="bi bi-globe"></i></span>
                                                    <input type="url" class="form-control" id="companyWebsite"
                                                        placeholder="https://">
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label">LinkedIn Profile</label>
                                                <div class="input-group">
                                                    <span class="input-group-text"><i class="bi bi-linkedin"></i></span>
                                                    <input type="url" class="form-control" id="linkedinUrl"
                                                        placeholder="https://linkedin.com/in/...">
                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                </div>

                                <!-- Security Tab -->
                                <div class="tab-pane fade" id="security">
                                    <h5 class="fw-bold mb-4">Change Password</h5>
                                    <form id="passwordForm">
                                        <div class="mb-3">
                                            <label class="form-label">New Password</label>
                                            <input type="password" class="form-control" id="newPassword"
                                                placeholder="Minimum 6 characters">
                                        </div>
                                        <div class="mb-4">
                                            <label class="form-label">Confirm New Password</label>
                                            <input type="password" class="form-control" id="confirmNewPassword">
                                        </div>
                                        <button type="button" class="btn btn-theme-primary"
                                            id="updatePasswordBtn">Update
                                            Password</button>
                                    </form>
                                </div>

                                <!-- Subscription Tab -->
                                <div class="tab-pane fade" id="subscription">
                                    <h5 class="fw-bold mb-4">Subscription & Usage</h5>
                                    <div class="card bg-light border-0 mb-3">
                                        <div class="card-body">
                                            <div class="d-flex justify-content-between align-items-center mb-3">
                                                <h6 class="mb-0 fw-bold">Current Plan</h6>
                                                <span class="badge bg-success">Active</span>
                                            </div>
                                            <p class="small text-muted mb-0">Identity Type: <span id="currentPlanType"
                                                    class="text-dark fw-bold">-</span></p>
                                        </div>
                                    </div>
                                    <div class="card bg-light border-0">
                                        <div class="card-body">
                                            <h6 class="fw-bold mb-3">Token Usage</h6>
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div>
                                                    <h3 class="mb-0 fw-bold text-theme-primary" id="tokenBalance">0</h3>
                                                    <p class="small text-muted mb-0">Tokens available</p>
                                                </div>
                                                <button class="btn btn-outline-theme btn-sm">Upgrade Plan</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Save Floating Bar -->
    <div class="save-bar" id="saveBar">
        <span class="text-muted small">You have unsaved changes</span>
        <div class="d-flex gap-2">
            <button class="btn btn-light btn-sm px-3" id="discardBtn">Discard</button>
            <button class="btn btn-theme-primary btn-sm px-4" id="saveBtn">Save Changes</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function () {
            const userData = JSON.parse(localStorage.getItem('fraxyUser'));
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }

            let hasChanges = false;
            let currentLogoBase64 = userData.CompanyLogo || '';

            // Initialization
            function init() {
                const firstName = userData.FirstName || userData.firstName || '';
                const lastName = userData.LastName || userData.lastName || '';
                const email = userData.Email || userData.email || '';
                const type = userData.UserType || userData.type || '';
                const tokens = userData.tokens !== undefined ? userData.tokens : (userData.Tokens || 0);

                // Apply Theme
                $('body').removeClass('theme-project theme-professional');
                if (type === 'project') $('body').addClass('theme-project');
                else if (type === 'professional') $('body').addClass('theme-professional');

                // Determine dashboard link
                let dashboardPage = 'investor-dashboard.html';
                if (type === 'project') dashboardPage = 'project-dashboard.html';
                else if (type === 'professional') dashboardPage = 'professional-dashboard.html';

                $('#backToDashboard').attr('href', dashboardPage);

                $('#userNameDisplay').text(`${firstName} ${lastName}`.trim() || email);
                $('#userTypeDisplay').text(type.charAt(0).toUpperCase() + type.slice(1));
                $('#currentPlanType').text(type.toUpperCase());
                $('#tokenBalance').text(tokens);

                // Load editable fields
                $('#businessReg').val(userData.BusinessReg || '');
                $('#companyWebsite').val(userData.CompanyWebsite || '');
                $('#linkedinUrl').val(userData.LinkedIn || '');

                currentLogoBase64 = userData.CompanyLogo || '';
                updateAllAvatarDisplays(currentLogoBase64);

                hasChanges = false;
                $('#saveBar').fadeOut();
                $('#logoUpload').val('');
            }

            function updateAllAvatarDisplays(url) {
                if (url) {
                    const imgHtml = `<img src="${url}" onerror="this.src='https://via.placeholder.com/100?text=Logo'">`;
                    $('#avatarContainer').html(imgHtml);
                    $('#avatarPreview').html(imgHtml);
                } else {
                    const iconHtml = '<i class="bi bi-person"></i>';
                    $('#avatarContainer').html(iconHtml);
                    $('#avatarPreview').html(iconHtml);
                }
            }

            init();

            // Handle Logo Upload
            $('#logoUpload').on('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        currentLogoBase64 = event.target.result;
                        updateAllAvatarDisplays(currentLogoBase64);
                        setChangesMade();
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Detect Changes
            function setChangesMade() {
                hasChanges = true;
                $('#saveBar').css('display', 'flex').fadeIn();
            }

            $('input').on('input change', function () {
                if ($(this).closest('#profileForm').length > 0) {
                    setChangesMade();
                }
            });

            // Navigation Guard for browser refresh/close
            window.addEventListener('beforeunload', function (e) {
                if (hasChanges) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });

            // Handle internal navigation clicks (Back to Dashboard, etc.)
            $('.btn-link, .nav-link').on('click', function (e) {
                // If it's a pill tab click, don't trigger warning
                if ($(this).hasClass('nav-link') && $(this).attr('data-bs-toggle') === 'pill') {
                    return;
                }

                if (hasChanges) {
                    e.preventDefault();
                    const href = $(this).attr('href');
                    const confirmMsg = "You have unsaved changes on your profile.\n\nClick 'OK' to SAVE and exit.\nClick 'Cancel' to DISCARD and exit.";

                    if (confirm(confirmMsg)) {
                        // Success save logic
                        $('#saveBtn').trigger('click');
                        setTimeout(() => { window.location.href = href; }, 600);
                    } else {
                        // Discard logic
                        window.location.href = href;
                    }
                }
            });

            // Save Changes
            $('#saveBtn').on('click', function () {
                const newReg = $('#businessReg').val().trim();
                const newWeb = $('#companyWebsite').val().trim();
                const newLinkedin = $('#linkedinUrl').val().trim();

                // Update current user
                const updatedUser = {
                    ...userData,
                    CompanyLogo: currentLogoBase64,
                    BusinessReg: newReg,
                    CompanyWebsite: newWeb,
                    LinkedIn: newLinkedin
                };

                saveToLocalStorage(updatedUser);
                hasChanges = false;
                $('#saveBar').fadeOut();
                updateAllAvatarDisplays(currentLogoBase64);
                alert('Profile updated successfully!');
            });

            // Discard Changes
            $('#discardBtn').on('click', function () {
                if (confirm('Discard all unsaved changes?')) {
                    init();
                }
            });

            // Update Password
            $('#updatePasswordBtn').on('click', function () {
                const newPass = $('#newPassword').val();
                const confirmPass = $('#confirmNewPassword').val();

                if (newPass.length < 6) {
                    alert('Password must be at least 6 characters long.');
                    return;
                }

                if (newPass !== confirmPass) {
                    alert('Passwords do not match.');
                    return;
                }

                const updatedUser = {
                    ...userData,
                    Password: newPass
                };

                saveToLocalStorage(updatedUser);
                $('#passwordForm')[0].reset();
                alert('Password updated successfully!');
            });

            function saveToLocalStorage(updatedUser) {
                // Update Session
                localStorage.setItem('fraxyUser', JSON.stringify(updatedUser));

                // Update "Database"
                let localUsers = JSON.parse(localStorage.getItem('localUsers')) || [];
                const email = (updatedUser.Email || updatedUser.email).toLowerCase();
                const userIndex = localUsers.findIndex(u => (u.Email || u.email || '').toLowerCase() === email);

                if (userIndex !== -1) {
                    localUsers[userIndex] = { ...localUsers[userIndex], ...updatedUser };
                    localStorage.setItem('localUsers', JSON.stringify(localUsers));
                }
            }
        });
    </script>
</body>

</html>
